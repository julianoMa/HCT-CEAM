<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEAM — Page introuvable</title>
  <script>
    (function () {
      var saved = localStorage.getItem("ceam-theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-card__logo">
        <span class="auth-card__logo-wrap">
          <img src="https://www.zupimages.net/up/22/30/as83.png" alt="CEAM" class="auth-card__logo-img">
        </span>
      </div>
      <p class="error-page__code">404</p>
      <h1>Page introuvable</h1>
      <p>
        Cette page n'existe pas, ou le dossier que tu cherches a peut-être
        été supprimé ou archivé.
      </p>
      <a href="{{ url_for('ceam.accueil') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">
        Retour à l'accueil
      </a>
    </div>
      <footer class="app-footer app-footer--auth">
        Fait avec <span class="app-footer__heart" aria-hidden="true">❤️</span> par
        <a href="https://github.com/julianoMa/HCT-CEAM" target="_blank" rel="noopener noreferrer">Thefern</a>
      </footer>
  </div>
</body>
</html>
